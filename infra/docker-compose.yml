# InfraSentinel full stack. Default: mock mode. Profile dev: adds NetBox.
# Usage: docker compose up -d (mock) | docker compose --profile dev up -d (dev)

services:
  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: kafka
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@kafka:29093"
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,PLAINTEXT_HOST://0.0.0.0:29092,CONTROLLER://0.0.0.0:29093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
      CLUSTER_ID: "MkU3OEVBNTcwNTJENDM2Qk"
    ports:
      - "29092:29092"
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics --bootstrap-server localhost:9092 --list"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s

  kafka-init:
    image: confluentinc/cp-kafka:7.6.0
    container_name: kafka-init
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint: ["/bin/bash", "-c"]
    command:
      - |
        kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic infrasentinel.change.started --partitions 1 --replication-factor 1
        kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic infrasentinel.step.completed --partitions 1 --replication-factor 1
        kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic infrasentinel.quality.failed --partitions 1 --replication-factor 1
        kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic infrasentinel.cmdb.mismatch --partitions 1 --replication-factor 1
        kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic infrasentinel.proofpack.ready --partitions 1 --replication-factor 1
        echo "All topics created."
    restart: "no"


  temporal-postgres:
    image: postgres:15
    container_name: temporal-postgres
    environment:
      POSTGRES_USER: temporal
      POSTGRES_PASSWORD: temporal
      POSTGRES_DB: temporal
    ports:
      - "5433:5432"
    volumes:
      - temporal_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U temporal -d temporal"]
      interval: 5s
      timeout: 5s
      retries: 5

  temporal:
    image: temporalio/auto-setup:1.25.1
    container_name: temporal
    depends_on:
      temporal-postgres:
        condition: service_healthy
    environment:
      DB: postgres12
      DB_PORT: 5432
      POSTGRES_USER: temporal
      POSTGRES_PWD: temporal
      POSTGRES_SEEDS: temporal-postgres
    ports:
      - "7233:7233"

  temporal-ui:
    image: temporalio/ui:2.31.0
    container_name: temporal-ui
    depends_on:
      - temporal
    environment:
      TEMPORAL_ADDRESS: temporal:7233
      TEMPORAL_CORS_ORIGINS: http://localhost:3000
    ports:
      - "8088:8080"

  app-postgres:
    image: postgres:15
    container_name: infrasentinel-postgres
    environment:
      POSTGRES_USER: infrasentinel
      POSTGRES_PASSWORD: infrasentinel
      POSTGRES_DB: infrasentinel
    ports:
      - "5432:5432"
    volumes:
      - app_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U infrasentinel -d infrasentinel"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:RELEASE.2025-01-20T14-49-07Z
    container_name: minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio123
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
  api:
    build:
      context: ..
      dockerfile: apps/api/Dockerfile
    container_name: infrasentinel-api
    depends_on:
      app-postgres:
        condition: service_healthy
      minio:
        condition: service_started
      temporal:
        condition: service_started
      kafka:
        condition: service_healthy
    environment:
      - INFRASENTINEL_MODE=${INFRASENTINEL_MODE:-mock}
      - TEMPORAL_ADDRESS=temporal:7233
      - DATABASE_URL=postgresql+asyncpg://infrasentinel:infrasentinel@app-postgres:5432/infrasentinel
      - EVIDENCE_BACKEND=${EVIDENCE_BACKEND:-local}
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=minio
      - MINIO_SECRET_KEY=minio123
      - MINIO_BUCKET=infrasentinel-evidence
      - LOCAL_EVIDENCE_DIR=/app/.data/evidence
      - INFRA_API_KEY=${INFRA_API_KEY:-}
      - AUTH_READS=${AUTH_READS:-false}
      - LLM_PROVIDER=${LLM_PROVIDER:-mock}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - ANTHROPIC_MODEL=${ANTHROPIC_MODEL:-claude-sonnet-4-6}
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - OTEL_EXPORTER_OTLP_ENDPOINT=${OTEL_EXPORTER_OTLP_ENDPOINT:-}
      - LANGFUSE_PUBLIC_KEY=${LANGFUSE_PUBLIC_KEY:-}
      - LANGFUSE_SECRET_KEY=${LANGFUSE_SECRET_KEY:-}
    ports:
      - "8080:8080"
    volumes:
      - api_data:/app/.data
      - ../runtime:/app/runtime
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/healthz"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  worker:
    build:
      context: ..
      dockerfile: apps/worker/Dockerfile
    container_name: infrasentinel-worker
    depends_on:
      temporal:
        condition: service_started
      app-postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      - INFRASENTINEL_MODE=${INFRASENTINEL_MODE:-mock}
      - TEMPORAL_ADDRESS=temporal:7233
      - TEMPORAL_TASK_QUEUE=infrasentinel-task-queue
      - DATABASE_URL=postgresql+asyncpg://infrasentinel:infrasentinel@app-postgres:5432/infrasentinel
      - SCENARIO=${SCENARIO:-CHG-001_A}
      - NETBOX_MODE=${NETBOX_MODE:-mock}
      - NETBOX_URL=${NETBOX_URL:-http://netbox:8080}
      - NETBOX_TOKEN=${NETBOX_TOKEN:-}
      - LOCAL_EVIDENCE_DIR=/app/.data/evidence
      - A2A_MODE=${A2A_MODE:-off}
      - A2A_MOP_URL=http://a2a-mop-agent:8091
      - A2A_VISION_URL=http://a2a-vision-agent:8092
      - A2A_CMDB_URL=http://a2a-cmdb-agent:8093
      - LLM_PROVIDER=${LLM_PROVIDER:-mock}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - ANTHROPIC_MODEL=${ANTHROPIC_MODEL:-claude-sonnet-4-6}
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - OTEL_EXPORTER_OTLP_ENDPOINT=${OTEL_EXPORTER_OTLP_ENDPOINT:-}
      - LANGFUSE_PUBLIC_KEY=${LANGFUSE_PUBLIC_KEY:-}
      - LANGFUSE_SECRET_KEY=${LANGFUSE_SECRET_KEY:-}
    volumes:
      - worker_data:/app/.data
      - ../runtime:/app/runtime

  mcp-camera:
    build:
      context: ..
      dockerfile: services/mcp_camera/Dockerfile
    container_name: mcp-camera
    stdin_open: true
    tty: true

  mcp-cv:
    build:
      context: ..
      dockerfile: services/mcp_cv/Dockerfile
    container_name: mcp-cv
    stdin_open: true
    tty: true

  mcp-netbox:
    build:
      context: ..
      dockerfile: services/mcp_netbox/Dockerfile
    container_name: mcp-netbox
    environment:
      - NETBOX_MODE=${NETBOX_MODE:-mock}
      - NETBOX_URL=${NETBOX_URL:-http://netbox:8080}
      - NETBOX_TOKEN=${NETBOX_TOKEN:-}
    stdin_open: true
    tty: true

  mcp-ticketing:
    build:
      context: ..
      dockerfile: services/mcp_ticketing/Dockerfile
    container_name: mcp-ticketing
    stdin_open: true
    tty: true

  a2a-mop-agent:
    build:
      context: ..
      dockerfile: services/a2a_mop_agent/Dockerfile
    container_name: a2a-mop-agent
    ports:
      - "8091:8091"
    environment:
      - A2A_MODE=${A2A_MODE:-off}

  a2a-vision-agent:
    build:
      context: ..
      dockerfile: services/a2a_vision_agent/Dockerfile
    container_name: a2a-vision-agent
    ports:
      - "8092:8092"
    environment:
      - A2A_MODE=${A2A_MODE:-off}

  a2a-cmdb-agent:
    build:
      context: ..
      dockerfile: services/a2a_cmdb_agent/Dockerfile
    container_name: a2a-cmdb-agent
    ports:
      - "8093:8093"
    environment:
      - A2A_MODE=${A2A_MODE:-off}

  # Dev profile: NetBox
  netbox-postgres:
    image: postgres:15-alpine
    container_name: netbox-postgres
    profiles:
      - dev
    environment:
      POSTGRES_DB: netbox
      POSTGRES_USER: netbox
      POSTGRES_PASSWORD: netbox
    ports:
      - "5434:5432"
    volumes:
      - netbox_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U netbox -d netbox"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

  netbox-redis:
    image: redis:7-alpine
    container_name: netbox-redis
    profiles:
      - dev
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s

  netbox:
    image: netboxcommunity/netbox:latest
    container_name: netbox
    profiles:
      - dev
    depends_on:
      netbox-postgres:
        condition: service_healthy
      netbox-redis:
        condition: service_healthy
    environment:
      # DB: use Docker service DNS (netbox-postgres:5432), NOT localhost or host port 5434
      DB_HOST: netbox-postgres
      DB_PORT: "5432"
      DB_NAME: netbox
      DB_USER: netbox
      DB_PASSWORD: netbox
      # Wait up to 120s for DB (entrypoint default is 30s)
      MAX_DB_WAIT_TIME: 120
      DB_WAIT_TIMEOUT: 3
      # Redis (no password for redis:7-alpine)
      REDIS_HOST: netbox-redis
      REDIS_PORT: "6379"
      REDIS_CACHE_HOST: netbox-redis
      REDIS_CACHE_PORT: "6379"
      # NetBox required (SECRET_KEY must be >= 50 chars; Django fails before DB if missing)
      SECRET_KEY: "django-insecure-dev-key-change-in-prod-xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx"
      SUPERUSER_NAME: admin
      SUPERUSER_EMAIL: admin@example.com
      SUPERUSER_PASSWORD: admin
      ALLOWED_HOSTS: "*"
    ports:
      - "8001:8080"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/login/"]
      start_period: 120s
      interval: 15s
      timeout: 5s
      retries: 5

networks:
  default:
    name: infrasentinel

volumes:
  temporal_postgres_data:
  app_postgres_data:
  minio_data:
  netbox_postgres_data:
  api_data:
  worker_data:
