name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-typecheck-test:
    runs-on: ubuntu-latest
    env:
      INFRASENTINEL_MODE: mock
      DATABASE_URL: sqlite+aiosqlite:///./test.db
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies (all extras)
        run: uv sync --extra dev --extra ocr --extra kafka --extra observability

      - name: Ruff
        run: uv run ruff check .

      - name: Mypy
        run: uv run mypy packages/ --ignore-missing-imports || true

      - name: Pytest
        run: uv run pytest tests/ -x --tb=short -q

  kafka-smoke:
    runs-on: ubuntu-latest
    needs: lint-typecheck-test
    services:
      kafka:
        image: confluentinc/cp-kafka:7.6.0
        env:
          KAFKA_NODE_ID: 1
          KAFKA_PROCESS_ROLES: broker,controller
          KAFKA_CONTROLLER_QUORUM_VOTERS: "1@localhost:29093"
          KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:29093
          KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
          KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
          KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
          KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
          KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
          KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
          CLUSTER_ID: "MkU3OEVBNTcwNTJENDM2Qk"
        ports:
          - 9092:9092
        options: >-
          --health-cmd "kafka-topics --bootstrap-server localhost:9092 --list"
          --health-interval 10s
          --health-timeout 10s
          --health-retries 10
          --health-start-period 30s
    env:
      INFRASENTINEL_MODE: mock
      DATABASE_URL: sqlite+aiosqlite:///./test.db
      KAFKA_BOOTSTRAP_SERVERS: localhost:9092
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: uv sync --extra dev --extra kafka

      - name: Kafka smoke tests
        run: uv run pytest tests/test_kafka.py -v --tb=short

  promptfoo:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' || github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install promptfoo
        run: npm install -g promptfoo

      - name: Run promptfoo eval
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          if [ -n "$OPENAI_API_KEY" ]; then
            npx promptfoo eval -c eval/promptfoo.yaml
          else
            echo "OPENAI_API_KEY not set, skipping promptfoo eval"
          fi

  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/api/Dockerfile
          push: false
          tags: infrasentinel-api:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build worker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/worker/Dockerfile
          push: false
          tags: infrasentinel-worker:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build MCP images
        run: |
          docker build -f services/mcp_camera/Dockerfile -t mcp-camera:test .
          docker build -f services/mcp_cv/Dockerfile -t mcp-cv:test .
          docker build -f services/mcp_netbox/Dockerfile -t mcp-netbox:test .
          docker build -f services/mcp_ticketing/Dockerfile -t mcp-ticketing:test .

      - name: Build A2A agent images
        run: |
          docker build -f services/a2a_mop_agent/Dockerfile -t a2a-mop:test .
          docker build -f services/a2a_vision_agent/Dockerfile -t a2a-vision:test .
          docker build -f services/a2a_cmdb_agent/Dockerfile -t a2a-cmdb:test .
